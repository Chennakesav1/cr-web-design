<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f4; }
        .card { background: white; padding: 30px; border-radius: 10px; text-align: center; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        button { background: #3399cc; color: white; padding: 12px 24px; border: none; font-size: 16px; border-radius: 5px; cursor: pointer; }
        button:hover { background: #287a9f; }
    </style>
</head>
<body>

<div class="card">
    <h2>Complete Purchase</h2>
    <p>Total: ₹500</p>
    <button id="rzp-button1">Pay with UPI / Card</button>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
document.getElementById('rzp-button1').onclick = async function(e) {
    e.preventDefault();

    // 1. Create Order on Backend
    const response = await fetch('/create-order', { method: 'POST' });
    const order = await response.json(); 

    // 2. Configure Razorpay Options
    var options = {
        "key": "rzp_test_SHcTCPb8RlHOiw", // 🔴 PASTE YOUR KEY ID HERE
        "amount": order.amount, 
        "currency": "INR",
        "name": "My Business",
        "description": "Test Transaction",
        "order_id": order.id, 
        "handler": async function (response){
            // 3. Verify Payment on Backend
            const verifyRes = await fetch('/verify-payment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    razorpay_order_id: response.razorpay_order_id,
                    razorpay_payment_id: response.razorpay_payment_id,
                    razorpay_signature: response.razorpay_signature
                })
            });

            const verifyData = await verifyRes.json();
            if(verifyData.success){
                alert("Payment Successful! ID: " + response.razorpay_payment_id);
                // window.location.href = "/success.html";
            } else {
                alert("Verification Failed");
            }
        },
        "prefill": {
            "name": "User Name",
            "email": "user@example.com",
            "contact": "9999999999"
        },
        "theme": { "color": "#3399cc" }
    };

    // 4. Open Checkout
    var rzp1 = new Razorpay(options);
    rzp1.on('payment.failed', function (response){
        alert("Payment Failed: " + response.error.description);
    });
    rzp1.open();
}
</script>

</body>
</html>
